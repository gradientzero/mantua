name: ci

# CI is the entrypoint for training. On every PR/push we run the downscaled end-to-end
# pipeline for confidence that the recipe still runs and produces a model.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest
      - name: Tiny end-to-end training run
        run: uv run mantua train
